syntax = "proto3";

package document_element.v1;

import "util/v1/measure.proto";
import "util/v1/advanced_illustration_area_image_settings.proto";

message ProtoAdvancedIllustrationArea {
  string uuid = 3;
  bool absolute = 4;
  util.v1.ProtoMeasure width = 5;
  util.v1.ProtoMeasure height = 6;
  util.v1.ProtoMeasure x = 7;
  util.v1.ProtoMeasure y = 8;
  util.v1.ProtoAdvancedIllustrationAreaTextFlowType text_flow = 9;
  float rotation = 10;
  repeated string com_channel_uuids = 11;
}
