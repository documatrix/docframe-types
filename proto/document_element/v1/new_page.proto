syntax = "proto3";

package document_element.v1;

enum ProtoPageMode {
  PROTO_PAGE_MODE_NEXT_PAGE = 0;
  PROTO_PAGE_MODE_NEXT_RECTO_PAGE = 1;
  PROTO_PAGE_MODE_NEXT_VERSO_PAGE = 2;
}

enum ProtoPageOrientation {
  PROTO_PAGE_ORIENTATION_UNSET = 0;
  PROTO_PAGE_ORIENTATION_PORTRAIT = 1;
  PROTO_PAGE_ORIENTATION_LANDSCAPE = 2;
  PROTO_PAGE_ORIENTATION_INVERSE_PORTRAIT = 3;
  PROTO_PAGE_ORIENTATION_INVERSE_LANDSCAPE = 4;
}

message ProtoNewPage {
  string uuid = 1;
  // Identifies the paper tray to be used for the following page.
  string paper_tray_uuid = 2;
  // Inherited from the referenced tray itself, not set directly.
  uint32  paper_tray_number = 3;
  // Page count for the referenced tray. Might be set directly.
  uint32  paper_count = 4;
  ProtoPageMode page_mode = 5;
  ProtoPageOrientation page_orientation = 6;
  // An optional page definition to be used for the new page.
  string p_def_uuid = 7;
  // An optional column definition to be used for the new page.
  string c_def_uuid = 8;
  repeated string com_channel_uuids = 9;
}
