syntax = "proto3";

package document_element.v1;

import "document_element/v1/document_element.proto";
import "util/v1/measure.proto";

message ProtoIndentation {
  // extends BranchDocumentElement
  repeated ProtoDocumentElement children = 1;
  ProtoDocumentElement parent = 2;
  // extends BranchDocumentElement

  util.v1.ProtoBoxedMeasure left = 3;
  util.v1.ProtoBoxedMeasure right = 4;
  string uuid = 5;
  repeated string com_channel_uuids = 6;
}
