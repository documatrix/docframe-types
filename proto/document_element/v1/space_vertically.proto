syntax = "proto3";

package document_element.v1;

import "document_element/v1/document_element.proto";
import "util/v1/measure.proto";

message ProtoSpaceVertically {
  //extends DocumentElement
  ProtoDocumentElement parent = 1;
  //extends DocumentElement

  util.v1.ProtoMeasure space = 2;
  repeated string com_channel_uuids = 3;
}
