syntax = "proto3";

package document_element.v1;

import "box/v1/bool.proto";
import "util/v1/column_settings.proto";

message ProtoCDef {
  util.v1.ProtoColumnSettings column_settings = 1;
  box.v1.ProtoBoxedBool apply_to_header_footer = 2;
  box.v1.ProtoBoxedBool apply_immediate = 3;
  string uuid = 4;
  repeated string com_channel_uuids = 5;
}
