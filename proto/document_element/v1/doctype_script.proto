syntax = "proto3";

package document_element.v1;

import "document_element/v1/document_element.proto";

enum ProtoDoctypeOutputMode {
  PROTO_DOCTYPE_OUTPUT_MODE_NOT_SET = 0;
  PROTO_DOCTYPE_OUTPUT_MODE_DOCTYPE = 1;
  PROTO_DOCTYPE_OUTPUT_MODE_JSON = 2;
}

// These elements are actually script snippets (usually dmSCRIPT), whichs result (String) is used
// as docTYPE code.
message ProtoDoctypeScript {
  // extends DocumentElement
  ProtoDocumentElement parent = 1;

  string content = 2;
  ProtoDoctypeOutputMode output_mode = 3;
  repeated string com_channel_uuids = 4;
  string uuid = 5;
}
