syntax = "proto3";

package document_element.v1;

import "util/v1/semantic_type.proto";

message ProtoTemplate {
  // BranchDocumentElement
  repeated string com_channel_uuids = 3;
  string uuid = 4;
  ProtoColumnBalancing column_balancing = 5;
  util.v1.ProtoSemanticType semantic_type = 6;
  string template_uuid = 7;
}

enum ProtoColumnBalancing {
  PROTO_COLUMN_BALANCING_NO_BALANCING = 0;
  PROTO_COLUMN_BALANCING_BALANCING = 1;
}
