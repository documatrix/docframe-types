syntax = "proto3";

package document_element.v1;

import "document_element/v1/document_element.proto";

message ProtoTextBrick {
  // extends BranchDocumentElement
  repeated ProtoDocumentElement children = 1;
  ProtoDocumentElement parent = 2;
  // extends BranchDocumentElement

  string uuid = 3;
  uint64 id = 4;
  repeated string com_channel_uuids = 5;
  bool editable = 6;
  string name = 7;
}
