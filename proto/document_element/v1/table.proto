syntax = "proto3";

package document_element.v1;

import "document_element/v1/carry_over.proto";
import "document_element/v1/sub_total.proto";
import "util/v1/color.proto";
import "util/v1/measure.proto";
import "util/v1/align.proto";
import "util/v1/inheritance.proto";
import "util/v1/border.proto";
import "box/v1/bool.proto";
import "box/v1/uint32.proto";
import "box/v1/double.proto";
import "box/v1/string.proto";

message ProtoTable {
  // BranchDocumentElement
  ProtoTableSettings settings = 3;
  string config_name = 4;
  ProtoCarryOver carry_over = 5;
  ProtoSubTotal sub_total = 6;
  repeated string com_channel_uuids = 7;
  ProtoTableElementProperties element_properties = 8;
}

message ProtoTableConfig {
  ProtoTableSettings settings = 2;
  string config_name = 3;
  repeated string com_channel_uuids = 4;
}

// go-gen:ignore
message ProtoTableSettings {
  util.v1.ProtoMeasure x_offset = 1;
  box.v1.ProtoBoxedBool left_measure = 2;
  util.v1.ProtoMeasure width = 3;
  box.v1.ProtoBoxedUint32 repeat_header = 4;
  ProtoTableWS ws = 5;
}

enum ProtoTableContentGroupType {
  PROTO_TABLE_CONTENT_GROUP_TYPE_HEADER = 0;
  PROTO_TABLE_CONTENT_GROUP_TYPE_BODY = 1;
  PROTO_TABLE_CONTENT_GROUP_TYPE_FOOTER = 2;
  PROTO_TABLE_CONTENT_GROUP_TYPE_SUB_HEADER = 3;
}

// go-gen:ignore
message ProtoBoxedTableContentGroupType {
  ProtoTableContentGroupType value = 1;
  bool is_null = 2;
}

message ProtoTableContentGroup {
  // BranchDocumentElement
  ProtoTableContentGroupSettings settings = 3;
  repeated string com_channel_uuids = 4;
  ProtoTableElementProperties element_properties = 5;
}

message ProtoTableContentGroupConfig {
  ProtoTableContentGroupSettings settings = 2;
  string config_name = 3;
  repeated string com_channel_uuids = 4;
}

// go-gen:ignore
message ProtoTableContentGroupSettings {
  ProtoBoxedTableContentGroupType content_group_type = 1;
  repeated util.v1.ProtoColor background_colors = 2;
  ProtoTableWS ws = 3;
}

message ProtoTableRow {
  // BranchDocumentElement
  ProtoTableRowSettings settings = 3;
  box.v1.ProtoBoxedUint32 row_config_number = 4;
  repeated string com_channel_uuids = 5;
  ProtoTableElementProperties element_properties = 6;
}

message ProtoTableRowConfig {
  ProtoTableRowSettings settings = 2;
  string config_name = 3;
  string row_header = 4;
  string row_footer = 5;
  repeated string com_channel_uuids = 6;
}

// go-gen:ignore
message ProtoTableRowSettings {
  util.v1.ProtoMeasure min_height = 1;
  ProtoTableWS ws = 2;
}

enum ProtoTableCellType {
  PROTO_TABLE_CELL_TYPE_BODY = 0;
  PROTO_TABLE_CELL_TYPE_ROW_HEADER = 1;
  PROTO_TABLE_CELL_TYPE_ROW_FOOTER = 2;
}

// go-gen:ignore
message ProtoBoxedTableCellType {
  ProtoTableCellType value = 1;
  bool is_null = 2;
}

message ProtoTableCell {
  // BranchDocumentElement
  ProtoTableCellSettings settings = 3;
  box.v1.ProtoBoxedUint32 cell_config_number = 4;
  // Indicates if this table cell should merged with the left table cell.
  bool merged_left = 5;
  // Indicates if this table cell should be merged with the cell above.
  bool merged_up = 6;
  repeated string com_channel_uuids = 7;
  ProtoTableElementProperties element_properties = 8;
}

message ProtoTableCellConfig {
  ProtoTableCellSettings settings = 2;
  string config_name = 3;
  ProtoBoxedTableCellType cell_type = 4;
  repeated string com_channel_uuids = 5;
}

// go-gen:ignore
message ProtoTableCellSettings {
  util.v1.ProtoMeasure width = 1;
  util.v1.ProtoBoxedHorizontalAlignment align = 2;
  util.v1.ProtoBoxedVerticalAlignment valign = 3;
  util.v1.ProtoColor background_color = 4;
  util.v1.ProtoSideMeasures padding = 5;
  util.v1.ProtoSideBorders border = 6;
  util.v1.ProtoSideMeasures margin = 7;
  box.v1.ProtoBoxedDouble rotation = 8;
  // If defaultParagraphFormat is not null, it contains the name of
  // a paragraph format, which should be used as default paragraph format
  // for content in a table cell using these settings.
  box.v1.ProtoBoxedString default_paragraph_format = 9;
}

// go-gen:ignore
message ProtoTableWS {
  uint32 min_lines_before = 1;
  uint32 min_lines_after = 2;
  uint32 priority = 3;
}

// go-gen:ignore
message ProtoTableElementProperties {
  util.v1.ProtoInheritance width_inheritance = 1;
  util.v1.ProtoMeasure width = 2;
  string width_code = 3;

  util.v1.ProtoInheritance align_inheritance = 4;
  util.v1.ProtoBoxedHorizontalAlignment align = 5;
  string align_code = 6;

  util.v1.ProtoInheritance valign_inheritance = 7;
  util.v1.ProtoBoxedVerticalAlignment valign = 8;
  string valign_code = 9;

  util.v1.ProtoInheritance background_color_inheritance = 10;
  repeated util.v1.ProtoColor background_color = 11;
  string background_color_code = 12;

  util.v1.ProtoInheritance padding_top_inheritance = 13;
  util.v1.ProtoMeasure padding_top = 14;
  string padding_top_code = 15;

  util.v1.ProtoInheritance padding_right_inheritance = 16;
  util.v1.ProtoMeasure padding_right = 17;
  string padding_right_code = 18;

  util.v1.ProtoInheritance padding_bottom_inheritance = 19;
  util.v1.ProtoMeasure padding_bottom = 20;
  string padding_bottom_code = 21;

  util.v1.ProtoInheritance padding_left_inheritance = 22;
  util.v1.ProtoMeasure padding_left = 23;
  string padding_left_code = 24;

  util.v1.ProtoInheritance border_top_color_inheritance = 25;
  util.v1.ProtoColor border_top_color = 26;
  string border_top_color_code = 27;

  util.v1.ProtoInheritance border_top_weight_inheritance = 28;
  util.v1.ProtoMeasure border_top_weight = 29;
  string border_top_weight_code = 30;

  util.v1.ProtoInheritance border_right_color_inheritance = 31;
  util.v1.ProtoColor border_right_color = 32;
  string border_right_color_code = 33;

  util.v1.ProtoInheritance border_right_weight_inheritance = 34;
  util.v1.ProtoMeasure border_right_weight = 35;
  string border_right_weight_code = 36;

  util.v1.ProtoInheritance border_bottom_color_inheritance = 37;
  util.v1.ProtoColor border_bottom_color = 38;
  string border_bottom_color_code = 39;

  util.v1.ProtoInheritance border_bottom_weight_inheritance = 40;
  util.v1.ProtoMeasure border_bottom_weight = 41;
  string border_bottom_weight_code = 42;

  util.v1.ProtoInheritance border_left_color_inheritance = 43;
  util.v1.ProtoColor border_left_color = 44;
  string border_left_color_code = 45;

  util.v1.ProtoInheritance border_left_weight_inheritance = 46;
  util.v1.ProtoMeasure border_left_weight = 47;
  string border_left_weight_code = 48;

  util.v1.ProtoInheritance margin_top_inheritance = 49;
  util.v1.ProtoMeasure margin_top = 50;
  string margin_top_code = 51;

  util.v1.ProtoInheritance margin_right_inheritance = 52;
  util.v1.ProtoMeasure margin_right = 53;
  string margin_right_code = 54;

  util.v1.ProtoInheritance margin_bottom_inheritance = 55;
  util.v1.ProtoMeasure margin_bottom = 56;
  string margin_bottom_code = 57;

  util.v1.ProtoInheritance margin_left_inheritance = 58;
  util.v1.ProtoMeasure margin_left = 59;
  string margin_left_code = 60;

  util.v1.ProtoInheritance rotation_inheritance = 61;
  box.v1.ProtoBoxedDouble rotation = 62;
  string rotation_code = 63;

  util.v1.ProtoInheritance default_paragraph_format_uuid_inheritance = 64;
  box.v1.ProtoBoxedString default_paragraph_format_uuid = 65;
  string default_paragraph_format_uuid_code = 66;

  util.v1.ProtoInheritance table_content_group_type_inheritance = 67;
  ProtoBoxedTableContentGroupType table_content_group_type = 68;
  string table_content_group_type_code = 69;

  util.v1.ProtoInheritance cell_type_inheritance = 70;
  ProtoBoxedTableCellType cell_type = 71;
  string cell_type_code = 72;

  util.v1.ProtoInheritance min_row_height_inheritance = 73;
  util.v1.ProtoMeasure min_row_height = 74;
  string min_row_height_code = 75;

  util.v1.ProtoInheritance ws_inheritance = 76;
  ProtoTableWS ws = 77;
  string ws_code = 78;
}

